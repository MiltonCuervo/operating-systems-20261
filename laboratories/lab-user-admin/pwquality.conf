# /etc/security/pwquality.conf
# Política de contraseñas — Laboratorio Linux
#
# Reglas exigidas por el laboratorio:
#   - Sin espacios en blanco (validado en el script)
#   - Al menos 1 carácter especial
#   - Al menos 1 letra mayúscula
#   - Mínimo 8 caracteres

# Longitud mínima
minlen = 8

# Al menos 1 dígito (credit negativo = obligatorio)
dcredit = -1

# Al menos 1 letra minúscula
lcredit = -1

# Al menos 1 letra MAYÚSCULA
ucredit = -1

# Al menos 1 carácter especial (other)
ocredit = -1

# No permitir palíndromos ni palabras del diccionario
dictcheck = 1

# Número mínimo de clases de caracteres requeridas
minclass = 3
